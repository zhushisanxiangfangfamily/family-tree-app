name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build debug APKs
        run: gradle assembleAdminDebug assemblePublicDebug

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: family-tree-admin
          path: app/build/outputs/apk/admin/debug/app-admin-debug.apk

      - name: Upload Public APK
        uses: actions/upload-artifact@v4
        with:
          name: family-tree-public
          path: app/build/outputs/apk/public/debug/app-public-debug.apk
